# nginx-asorapa.conf
# Configuracion nginx para eQSO ASORAPA en VM Ubuntu
#
# Variables sustituidas por vm-deploy.sh:
#   __CLIENT_DIST__ → ruta al dist/ del web client compilado
#   __API_PORT__    → puerto HTTP del API server (ej: 3000)
#
# Instalacion manual:
#   sudo cp nginx-asorapa.conf /etc/nginx/sites-available/asorapa
#   sudo sed -i 's|__CLIENT_DIST__|/opt/eqso-asorapa/artifacts/eqso-client/dist|g' /etc/nginx/sites-available/asorapa
#   sudo sed -i 's|__API_PORT__|3000|g' /etc/nginx/sites-available/asorapa
#   sudo ln -sf /etc/nginx/sites-available/asorapa /etc/nginx/sites-enabled/asorapa
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    # Aumentar timeout para WebSocket (conexiones largas de radio)
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # ── WebSocket eQSO (/ws) ───────────────────────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:__API_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket telemetría relay (/ws-relay) ─────────────────────────────
    location /ws-relay {
        proxy_pass http://127.0.0.1:__API_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API REST (/api) ────────────────────────────────────────────────────
    location /api {
        proxy_pass http://127.0.0.1:__API_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Web client (React SPA) ─────────────────────────────────────────────
    root __CLIENT_DIST__;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estaticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

# NOTA: para HTTPS con Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d asorapa.sytes.net
